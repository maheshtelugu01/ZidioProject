#Datasource cfg for Oracle
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql:///NTSPBMS716DB
spring.datasource.username=root
spring.datasource.password=root

 

#enable hibernate lazy loading with out transaction mgmt (required for getOne(-),getById(-),getReference(-) methods)
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

#JPA-Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

#Embedded tomcat server port number
server.port=4041

#Context path of the web application
#server.servlet.context-path=/MiniProj12

 
